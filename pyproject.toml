[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B"]
ignore = [
    "E402", # Module level import not at top of file
    "E501", # Line too long
    "B008", # Do not perform function call in argument defaults (FastAPI Depends/File/Form)
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false # Start relaxed
check_untyped_defs = true

[[tool.mypy.overrides]]
module = [
    "cv2",
    "numpy",
    "cryptography.*",
    "fastapi.*",
    "jinja2.*"
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "phantasm.ai_gate",
    "phantasm.face_lock"
]
ignore_errors = true
