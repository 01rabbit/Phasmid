<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Phantasm{% endblock %}</title>
    <style>
        :root {
            --bg: #0e1116;
            --panel: #171b22;
            --panel-2: #202631;
            --line: #303846;
            --text: #f4f7fb;
            --muted: #9aa7b6;
            --blue: #4f8cff;
            --blue-2: #2f65c9;
            --green: #3ddc97;
            --yellow: #f4c95d;
            --red: #ff5f57;
            --red-2: #b8342e;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
        }
        a { color: inherit; text-decoration: none; }
        .shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 40px; }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 26px;
        }
        .brand h1 { font-size: 22px; margin: 0 0 4px; }
        .brand p { color: var(--muted); margin: 0; font-size: 13px; }
        .nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav a {
            color: var(--muted);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 14px;
            background: rgba(255,255,255,0.02);
        }
        .nav a.active { color: var(--text); border-color: var(--blue); background: rgba(79,140,255,0.14); }
        .grid { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr); gap: 18px; }
        .grid-single { display: grid; gap: 18px; }
        .status-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
        .status-card, .panel {
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 8px;
            box-shadow: 0 16px 38px rgba(0,0,0,0.24);
        }
        .status-card { padding: 16px; min-height: 96px; }
        .status-card strong { display: block; font-size: 18px; margin-top: 12px; }
        .status-card small, .card-label { color: var(--muted); font-size: 12px; }
        .panel { padding: 20px; }
        .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
        h2 { font-size: 17px; margin: 0; }
        h3 { font-size: 14px; margin: 20px 0 12px; color: var(--muted); text-transform: uppercase; }
        .copy { color: var(--muted); line-height: 1.55; font-size: 14px; margin: 0 0 16px; }
        .camera-feed {
            display: block;
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: contain;
            object-position: center center;
            background: #050608;
            border-radius: 6px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 12px;
            border: 1px solid var(--line);
            color: var(--muted);
            white-space: nowrap;
        }
        .badge.good { color: var(--green); border-color: rgba(61,220,151,0.5); }
        .badge.warn { color: var(--yellow); border-color: rgba(244,201,93,0.5); }
        .badge.bad { color: var(--red); border-color: rgba(255,95,87,0.55); }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
        button, .button, input, select {
            font: inherit;
            border-radius: 8px;
            border: 1px solid var(--line);
        }
        button, .button {
            cursor: pointer;
            color: white;
            background: var(--blue);
            border-color: var(--blue-2);
            padding: 11px 14px;
            font-weight: 650;
        }
        button.secondary, .button.secondary { background: var(--panel-2); border-color: var(--line); color: var(--text); }
        button.danger, .button.danger { background: var(--red-2); border-color: var(--red); }
        button.small, .button.small { padding: 8px 10px; font-size: 13px; }
        .field { display: grid; gap: 7px; margin-bottom: 14px; }
        .field span { color: var(--muted); font-size: 13px; }
        input, select {
            width: 100%;
            background: #11151b;
            color: var(--text);
            padding: 12px;
        }
        input:focus, select:focus { outline: 2px solid rgba(79,140,255,0.55); }
        details {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            margin: 14px 0;
        }
        summary { cursor: pointer; color: var(--muted); }
        .codebox {
            margin: 0;
            min-height: 132px;
            white-space: pre-wrap;
            overflow: auto;
            background: #090b0f;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: #c8d3df;
            padding: 14px;
            font-size: 13px;
        }
        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            max-width: 420px;
            padding: 14px 16px;
            border-radius: 8px;
            background: var(--panel-2);
            border: 1px solid var(--line);
            color: var(--text);
            box-shadow: 0 14px 30px rgba(0,0,0,0.34);
            opacity: 0;
            transform: translateY(12px);
            transition: opacity .18s, transform .18s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .result-panel { display: none; }
        .warning-copy {
            border-left: 3px solid var(--red);
            padding: 10px 12px;
            color: #ffd4d1;
            background: rgba(255,95,87,0.08);
            margin: 0 0 16px;
            line-height: 1.5;
        }
        .hidden { display: none !important; }
        @media (max-width: 850px) {
            .topbar { align-items: flex-start; flex-direction: column; }
            .grid, .status-grid { grid-template-columns: 1fr; }
            .shell { width: min(100% - 20px, 1180px); padding-top: 18px; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <div class="brand">
                <h1>Phantasm</h1>
                <p>Local-only protected storage interface</p>
            </div>
            {% if active != "lock" %}
            <nav class="nav" aria-label="Primary navigation">
                <a href="/" class="{{ 'active' if active == 'home' else '' }}">Home</a>
                <a href="/store" class="{{ 'active' if active == 'store' else '' }}">Store</a>
                <a href="/retrieve" class="{{ 'active' if active == 'retrieve' else '' }}">Retrieve</a>
                <a href="/maintenance" class="{{ 'active' if active == 'maintenance' else '' }}">Maintenance</a>
            </nav>
            {% endif %}
        </header>

        {% block content %}{% endblock %}
    </main>
    <div id="toast" class="toast"></div>

    <script>
        let webToken = "{{ web_token }}";
        const maxUploadBytes = Number("{{ max_upload_bytes }}");

        function toast(message) {
            const el = document.getElementById('toast');
            el.textContent = message;
            el.classList.add('show');
            window.setTimeout(() => el.classList.remove('show'), 3600);
        }

        async function apiFetch(url, options = {}) {
            const headers = options.headers || {};
            headers['X-Phantasm-Token'] = webToken;
            return fetch(url, { ...options, headers });
        }

        async function confirmRestrictedAction(confirmation) {
            const body = new URLSearchParams({ confirmation });
            const res = await apiFetch('/restricted/confirm', { method: 'POST', body });
            const data = await res.json();
            toast(data.status || data.error || 'Restricted confirmation finished.');
            return Boolean(data.status);
        }

        function stateText(value) {
            return {
                none: 'No object detected',
                detected: 'Object detected',
                matched: 'Stable match',
                ambiguous: 'Ambiguous object'
            }[value] || 'Unavailable';
        }

        function paintObjectBadge(value) {
            const badge = document.getElementById('objectBadge');
            if (!badge) return;
            badge.textContent = stateText(value);
            badge.className = 'badge';
            if (value === 'matched') badge.classList.add('good');
            else if (value === 'detected') badge.classList.add('warn');
            else if (value === 'ambiguous') badge.classList.add('bad');
            else badge.classList.add('neutral');
        }

        async function pollStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                const device = document.getElementById('deviceState');
                const camera = document.getElementById('cameraState');
                const object = document.getElementById('objectState');
                const mode = document.getElementById('operationMode');
                if (device) device.textContent = data.device_state === 'ready' ? 'Ready' : 'Locked';
                if (camera) camera.textContent = data.camera_ready ? 'Active' : 'Unavailable';
                if (object) object.textContent = stateText(data.object_state);
                if (mode) mode.textContent = data.local_mode ? 'Local-only' : 'Restricted';
                paintObjectBadge(data.object_state);
            } catch (e) {}
        }
        pollStatus();
        window.setInterval(pollStatus, 1200);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
