<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Phasmid{% endblock %}</title>
    <link rel="icon" href="/static/favicon.ico" sizes="any">
    <style>
        /* ── Design Tokens ────────────────────────────────────── */
        :root {
            /* Backgrounds */
            --bg-void:    #090c0a;
            --bg-base:    #101512;
            --bg-surface: #151b17;
            --bg-raised:  #1a221d;
            --bg-overlay: #202a23;

            /* Borders */
            --border:        #2c3530;
            --border-soft:   #222923;
            --border-focus:  #52664a;
            --border-accent: #647f58;

            /* Text */
            --text:           #d2d8cf;
            --text-secondary: #96a28f;
            --text-muted:     #667062;
            --text-danger:    #e8a0a0;

            /* Accent (from logo insect body color) */
            --accent:        #73955b;
            --accent-dim:    #536d43;
            --accent-bright: #a8c684;

            /* Status */
            --status-ready:   #50cc84;
            --status-caution: #c89c36;
            --status-alert:   #cc4040;
            --status-off:     #4a5449;

            /* Glows */
            --glow-accent:  rgba(115,149,91,0.14);
            --glow-ready:   rgba(80,204,132,0.20);
            --glow-alert:   rgba(204,64,64,0.16);
            --glow-caution: rgba(200,156,54,0.18);

            /* Camera */
            --camera-bg: #040808;

            /* Radius */
            --r-sm:   2px;
            --r-md:   4px;
            --r-lg:   6px;
            --r-pill: 999px;

            /* Transitions */
            --t-fast: 0.12s ease;
            --t-base: 0.18s ease;
            --t-slow: 0.28s ease;
        }

        /* ── Reset ────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(115,149,91,0.05), transparent 30%),
                radial-gradient(circle at top right, rgba(80,204,132,0.03), transparent 28%),
                linear-gradient(180deg, #121814 0%, var(--bg-base) 28%, var(--bg-void) 100%);
            color: var(--text);
            font-family: "Inter", "Barlow", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
            line-height: 1.5;
            letter-spacing: 0;
            -webkit-font-smoothing: antialiased;
        }
        a { color: inherit; text-decoration: none; }

        /* ── Shell ────────────────────────────────────────────── */
        .shell {
            width: min(1200px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 48px;
        }
        .shell::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: linear-gradient(180deg, rgba(0,0,0,.35), transparent 88%);
            opacity: 0.16;
        }

        /* ── Topbar ───────────────────────────────────────────── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-soft);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-logo {
            width: 38px;
            height: 38px;
            object-fit: contain;
            opacity: 0.92;
            filter: drop-shadow(0 0 8px rgba(115,149,91,0.28));
            flex-shrink: 0;
        }
        .brand-text h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.06em;
            margin: 0 0 2px;
            color: var(--text);
            text-transform: uppercase;
        }
        .brand-text p {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin: 0;
        }

        /* ── Navigation ───────────────────────────────────────── */
        .nav {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
        }
        .nav a {
            color: var(--text-muted);
            padding: 7px 14px;
            font-size: 13px;
            letter-spacing: 0.03em;
            border-bottom: 2px solid transparent;
            border-radius: var(--r-md) var(--r-md) 0 0;
            transition: color var(--t-fast), border-color var(--t-fast), background var(--t-fast);
        }
        .nav a:hover {
            color: var(--text-secondary);
            background: rgba(122,170,72,0.06);
        }
        .nav a.active {
            color: var(--accent-bright);
            border-bottom-color: var(--accent);
            background: rgba(122,170,72,0.08);
        }

        /* ── Layouts ──────────────────────────────────────────── */
        .grid        { display: grid; grid-template-columns: minmax(0,1.1fr) minmax(300px,0.9fr); gap: 18px; }
        .grid-single { display: grid; gap: 18px; }
        .stack { display: grid; gap: 18px; }
        .split-grid { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr); gap: 18px; }

        /* ── Status Grid ──────────────────────────────────────── */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0,1fr));
            gap: 10px;
            margin-bottom: 18px;
        }

        /* ── Status Card ──────────────────────────────────────── */
        .status-card {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-left: 2px solid var(--border-accent);
            border-radius: var(--r-md);
            background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 55%), var(--bg-surface);
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 94px;
        }
        .status-card__head {
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .status-card__value {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            font-feature-settings: "tnum" 1;
            line-height: 1.1;
        }

        /* ── LED Indicator ────────────────────────────────────── */
        .led {
            display: inline-block;
            flex-shrink: 0;
            width: 8px;
            height: 8px;
            border-radius: var(--r-pill);
            background: var(--status-off);
            transition: background var(--t-base), box-shadow var(--t-base);
        }
        .led--ready   { background: var(--status-ready);   box-shadow: 0 0 6px var(--glow-ready); }
        .led--active  { background: var(--accent-bright);  box-shadow: 0 0 7px var(--glow-accent); animation: led-pulse 2.4s ease-in-out infinite; }
        .led--caution { background: var(--status-caution); box-shadow: 0 0 5px var(--glow-caution); }
        .led--alert   { background: var(--status-alert);   box-shadow: 0 0 6px var(--glow-alert); }

        @keyframes led-pulse {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.5; }
        }

        /* ── Section Label ────────────────────────────────────── */
        .section-label {
            font-size: 11px;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* ── Panel ────────────────────────────────────────────── */
        .panel {
            border: 1px solid var(--border);
            border-left: 2px solid var(--border-accent);
            background: linear-gradient(180deg, rgba(255,255,255,0.025), transparent 48%), var(--bg-surface);
            border-radius: var(--r-md);
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.28);
        }
        .panel--danger {
            border-left-color: var(--status-alert);
            background: color-mix(in srgb, var(--bg-surface) 93%, #cc0000 7%);
        }
        .panel--caution {
            border-left-color: var(--status-caution);
        }
        .panel--neutral {
            border-left-color: var(--border);
        }
        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }
        .panel-kicker {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .panel-kicker::before {
            content: "";
            width: 24px;
            height: 1px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }
        .hero-panel {
            position: relative;
            overflow: hidden;
        }
        .hero-panel::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 85% 15%, rgba(122,170,72,0.12), transparent 26%),
                linear-gradient(135deg, rgba(255,255,255,0.02), transparent 45%);
            pointer-events: none;
        }
        .hero-panel > * { position: relative; z-index: 1; }
        .hero-copy {
            max-width: 60ch;
            margin-bottom: 0;
        }
        .section-intro {
            display: grid;
            gap: 8px;
            margin-bottom: 18px;
        }
        .section-intro h2,
        .section-intro p {
            margin: 0;
        }
        .eyebrow {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 18px;
        }
        .meta-card {
            padding: 12px 14px;
            border: 1px solid var(--border-soft);
            border-radius: var(--r-md);
            background: rgba(0, 0, 0, 0.12);
            display: grid;
            gap: 5px;
        }
        .meta-card strong {
            font-size: 14px;
            line-height: 1.2;
            color: var(--text);
        }
        .meta-card span {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .panel-grid {
            display: grid;
            gap: 18px;
        }
        .panel-grid.two-up {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        /* ── Typography ───────────────────────────────────────── */
        h2 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: 0.02em; }
        h3 {
            font-size: 11px;
            font-weight: 600;
            margin: 22px 0 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.10em;
        }
        .copy {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 13px;
            margin: 0 0 14px;
        }
        .copy:last-child { margin-bottom: 0; }
        .microcopy {
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.55;
        }

        /* ── Camera ───────────────────────────────────────────── */
        .camera-frame {
            position: relative;
            background: var(--camera-bg);
            border-radius: var(--r-md);
            overflow: hidden;
        }
        .camera-feed {
            display: block;
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: contain;
            object-position: center;
        }
        /* HUD corner brackets */
        .camera-corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.65;
            pointer-events: none;
            transition: opacity var(--t-base), border-color var(--t-base);
        }
        .camera-corner.tl { top: 9px;    left: 9px;    border-width: 2px 0 0 2px; }
        .camera-corner.tr { top: 9px;    right: 9px;   border-width: 2px 2px 0 0; }
        .camera-corner.bl { bottom: 9px; left: 9px;    border-width: 0 0 2px 2px; }
        .camera-corner.br { bottom: 9px; right: 9px;   border-width: 0 2px 2px 0; }
        .camera-frame.matched .camera-corner {
            opacity: 1;
            border-color: var(--status-ready);
        }
        @keyframes frame-lock {
            0%   { box-shadow: none; }
            40%  { box-shadow: inset 0 0 0 1px var(--accent-bright), 0 0 18px var(--glow-accent); }
            100% { box-shadow: inset 0 0 0 1px var(--accent); }
        }
        .camera-frame.matched {
            animation: frame-lock 0.6s ease-out forwards;
        }
        .camera-live {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: var(--text-muted);
            background: rgba(4, 8, 8, 0.72);
            padding: 3px 8px;
            border-radius: var(--r-sm);
            pointer-events: none;
        }

        /* ── Badge ────────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 9px 3px 7px;
            border-radius: var(--r-sm);
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 600;
            border: 1px solid var(--border);
            color: var(--text-muted);
            white-space: nowrap;
        }
        .badge.good    { color: var(--status-ready);   border-color: rgba(80,204,132,.35);  background: rgba(80,204,132,.07); }
        .badge.warn    { color: var(--status-caution); border-color: rgba(200,156,54,.35);  background: rgba(200,156,54,.07); }
        .badge.bad     { color: var(--status-alert);   border-color: rgba(204,64,64,.38);   background: rgba(204,64,64,.07); }
        .badge.active  { color: var(--accent-bright);  border-color: rgba(122,170,72,.40);  background: rgba(122,170,72,.09); }
        .badge.neutral { color: var(--text-muted);     border-color: var(--border); }

        /* ── Buttons ──────────────────────────────────────────── */
        button, .button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font: inherit;
            font-size: 13px;
            font-weight: 650;
            letter-spacing: 0.03em;
            padding: 9px 15px;
            border-radius: var(--r-lg);
            border: 1px solid;
            transition: background var(--t-fast), box-shadow var(--t-fast), border-color var(--t-fast), color var(--t-fast);
            /* Primary */
            color: #0a1008;
            background: var(--accent);
            border-color: var(--accent-dim);
        }
        button:hover, .button:hover {
            background: var(--accent-bright);
            box-shadow: 0 0 14px var(--glow-accent);
        }
        button.secondary, .button.secondary {
            color: var(--text-secondary);
            background: var(--bg-raised);
            border-color: var(--border);
        }
        button.secondary:hover, .button.secondary:hover {
            color: var(--text);
            border-color: var(--border-focus);
            background: var(--bg-overlay);
        }
        button.danger, .button.danger {
            color: #f0d0d0;
            background: #4a1818;
            border-color: var(--status-alert);
        }
        button.danger:hover, .button.danger:hover {
            background: #6a2020;
            box-shadow: 0 0 12px var(--glow-alert);
        }
        button.small, .button.small { padding: 7px 11px; font-size: 12px; }

        /* ── Actions ──────────────────────────────────────────── */
        .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
        .actions.tight { margin-top: 12px; }
        .action-group {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }
        .action-group + .action-group {
            padding-top: 14px;
            border-top: 1px solid var(--border-soft);
        }

        /* ── Fields ───────────────────────────────────────────── */
        .field { display: grid; gap: 6px; margin-bottom: 13px; }
        .field span { color: var(--text-muted); font-size: 12px; letter-spacing: 0.04em; }
        .field small {
            color: var(--text-muted);
            font-size: 11px;
            line-height: 1.45;
        }
        input, select {
            font: inherit;
            font-size: 13px;
            border-radius: var(--r-lg);
            border: 1px solid var(--border);
            width: 100%;
            background: var(--bg-raised);
            color: var(--text);
            padding: 10px 12px;
            transition: border-color var(--t-fast), box-shadow var(--t-fast);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(74,112,56,.18);
        }
        input::placeholder { color: var(--text-muted); }

        /* ── Details / Summary ────────────────────────────────── */
        details {
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 11px 14px;
            background: rgba(255,255,255,0.015);
            margin: 12px 0;
        }
        summary {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 13px;
            letter-spacing: 0.02em;
            user-select: none;
        }
        summary:hover { color: var(--text-secondary); }
        details[open] summary { margin-bottom: 12px; color: var(--text-secondary); }
        .detail-body {
            display: grid;
            gap: 12px;
        }

        /* ── Codebox ──────────────────────────────────────────── */
        .codebox {
            margin: 0;
            min-height: 128px;
            white-space: pre-wrap;
            overflow: auto;
            background: var(--bg-void);
            border: 1px solid var(--border-soft);
            border-radius: var(--r-md);
            color: var(--text-secondary);
            padding: 14px;
            font-family: "JetBrains Mono", "IBM Plex Mono", Consolas, monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        /* ── Warning Strip ────────────────────────────────────── */
        .warning-copy {
            display: flex;
            gap: 10px;
            padding: 10px 14px;
            border-left: 2px solid var(--status-alert);
            background: rgba(204,64,64,.07);
            border-radius: 0 var(--r-md) var(--r-md) 0;
            color: var(--text-danger);
            font-size: 13px;
            line-height: 1.55;
            margin: 0 0 14px;
        }

        /* ── Toast ────────────────────────────────────────────── */
        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            max-width: 400px;
            padding: 13px 16px;
            border-radius: var(--r-md);
            background: var(--bg-overlay);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            color: var(--text);
            font-size: 13px;
            box-shadow: 0 12px 28px rgba(0,0,0,.40);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity var(--t-base), transform var(--t-base);
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.toast--success { border-left-color: var(--status-ready); }
        .toast.toast--error   { border-left-color: var(--status-alert); }
        .toast.toast--caution { border-left-color: var(--status-caution); }

        /* ── Result Panel ─────────────────────────────────────── */
        .result-panel { display: none; margin-top: 16px; }
        .result-panel.is-visible { display: block; }
        .result-summary {
            display: grid;
            gap: 10px;
        }
        .result-summary__row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            border: 1px solid var(--border-soft);
            border-radius: var(--r-md);
            background: rgba(0, 0, 0, 0.14);
        }
        .flow-list {
            display: grid;
            gap: 10px;
            margin: 0;
            padding: 0;
            list-style: none;
            counter-reset: flow;
        }
        .flow-list li {
            counter-increment: flow;
            display: grid;
            grid-template-columns: 28px 1fr;
            gap: 12px;
            align-items: start;
            padding: 10px 0;
            border-top: 1px solid var(--border-soft);
        }
        .flow-list li:first-child { border-top: 0; padding-top: 0; }
        .flow-list li::before {
            content: counter(flow, decimal-leading-zero);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            color: var(--accent-bright);
            font-size: 11px;
            letter-spacing: 0.08em;
            background: rgba(122,170,72,0.08);
        }
        .tone-card {
            padding: 14px;
            border: 1px solid var(--border-soft);
            border-radius: var(--r-md);
            background: rgba(255,255,255,0.015);
            display: grid;
            gap: 6px;
        }
        .tone-card h3 {
            margin: 0;
        }
        .surface-note {
            padding: 12px 14px;
            border-radius: var(--r-md);
            border: 1px solid var(--border-soft);
            background: rgba(0,0,0,0.12);
        }

        /* ── Utilities ────────────────────────────────────────── */
        .hidden { display: none !important; }
        .camera-panel { padding-bottom: 0; }
        .camera-panel .panel-head { padding-bottom: 14px; }

        /* ── Responsive ───────────────────────────────────────── */
        @media (max-width: 900px) {
            .topbar { flex-direction: column; align-items: flex-start; gap: 16px; }
            .grid, .status-grid, .split-grid, .panel-grid.two-up { grid-template-columns: 1fr; }
            .shell { padding-top: 18px; }
        }
        @media (max-width: 520px) {
            .status-grid { grid-template-columns: 1fr 1fr; }
            .nav a { padding: 7px 10px; font-size: 12px; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <div class="brand">
                <img src="/static/logo.png" alt="Phasmid" class="brand-logo">
                <div class="brand-text">
                    <h1>Phasmid</h1>
                    <p>Local-only protected storage interface</p>
                </div>
            </div>
            {% if active != "lock" and active != "emergency" %}
            <nav class="nav" aria-label="Primary navigation">
                <a href="/" class="{{ 'active' if active == 'home' else '' }}">Home</a>
                <a href="/store" class="{{ 'active' if active == 'store' else '' }}">Store</a>
                <a href="/retrieve" class="{{ 'active' if active == 'retrieve' else '' }}">Retrieve</a>
                <a href="/maintenance" class="{{ 'active' if active == 'maintenance' else '' }}">Maintenance</a>
            </nav>
            {% endif %}
        </header>

        {% block content %}{% endblock %}
    </main>
    <div id="toast" class="toast"></div>

    <script>
        let webToken = "{{ web_token }}";
        const maxUploadBytes = Number("{{ max_upload_bytes }}");

        function toast(message, type) {
            const el = document.getElementById('toast');
            el.textContent = message;
            el.className = 'toast' + (type ? ' toast--' + type : '');
            el.classList.add('show');
            window.setTimeout(() => el.classList.remove('show'), 3600);
        }

        async function apiFetch(url, options = {}) {
            const headers = options.headers || {};
            headers['X-Phasmid-Token'] = webToken;
            return fetch(url, { ...options, headers });
        }

        async function confirmRestrictedAction(confirmation) {
            const body = new URLSearchParams({ confirmation });
            const res = await apiFetch('/restricted/confirm', { method: 'POST', body });
            const data = await res.json();
            toast(data.status || data.error || 'Restricted confirmation finished.');
            return Boolean(data.status);
        }

        function stateText(value) {
            return {
                none:      'No object',
                detected:  'Detected',
                matched:   'Stable match',
                ambiguous: 'Ambiguous'
            }[value] || 'Unavailable';
        }

        function setLed(el, state) {
            if (!el) return;
            el.className = 'led';
            if (state && state !== 'off') el.classList.add('led--' + state);
        }

        function paintObjectBadge(value) {
            const badge = document.getElementById('objectBadge');
            if (!badge) return;
            badge.className = 'badge';
            if (value === 'matched')   badge.classList.add('good');
            else if (value === 'detected')  badge.classList.add('warn');
            else if (value === 'ambiguous') badge.classList.add('bad');
            else                            badge.classList.add('neutral');
            const led = badge.querySelector('.led');
            if (led) {
                setLed(led, value === 'matched' ? 'ready' : value === 'detected' ? 'caution' : value === 'ambiguous' ? 'alert' : '');
            }
            const txt = badge.querySelector('.badge-text');
            if (txt) txt.textContent = stateText(value);

            const frame = document.querySelector('.camera-frame');
            if (frame) {
                frame.classList.toggle('matched', value === 'matched');
            }
        }

        async function pollStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                const device = document.getElementById('deviceState');
                const camera = document.getElementById('cameraState');
                const object = document.getElementById('objectState');
                const mode   = document.getElementById('operationMode');
                if (device) device.textContent = data.device_state === 'ready' ? 'Ready' : 'Locked';
                if (camera) camera.textContent = data.camera_ready ? 'Active' : 'Unavailable';
                if (object) object.textContent = stateText(data.object_state);
                if (mode)   mode.textContent   = data.local_mode ? 'Local-only' : 'Restricted';

                setLed(document.getElementById('deviceStateLed'),    data.device_state === 'ready' ? 'ready' : 'alert');
                setLed(document.getElementById('cameraStateLed'),    data.camera_ready ? 'active' : '');
                setLed(document.getElementById('objectStateLed'),    {matched:'ready', detected:'caution', ambiguous:'alert', none:''}[data.object_state] || '');
                setLed(document.getElementById('operationModeLed'),  'active');

                paintObjectBadge(data.object_state);
            } catch (e) {}
        }
        pollStatus();
        window.setInterval(pollStatus, 1200);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
